<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-Vindo ao Seedra!</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400;1,900&display=swap" rel="stylesheet">

    <!-- <script>
        tailwind.config = {
        theme: {
            extend: {
            fontFamily: {
                lato: ['Lato', 'sans-serif'],
            }
            }
        }
        }
    </script> -->
</head>
<body class="bg-[#517547] font-family-[Balsamiq+Sans]">
    <main class="flex justify-center items-center h-screen font-[Lato]">
        <section class="flex flex-col border rounded-2xl justify-center items-center bg-gray-200 h-115 w-100 gap-10 shadow-2xl shadow-green-800">

            <p class="text-5xl">Bem-Vindo!</p>

            <div class="flex flex-col gap-5" id="formulario">

                <input class="border-gray-500 rounded-sm px-3 py-1" 
                type="email" placeholder="Digite seu email..." id="email">

                <input class="border-gray-500 rounded-sm px-3 py-1" type="password" placeholder="Digite sua senha..." id="senha">

                <button class="btn btn-neutral bg-green-700 px-7 " onclick="fazer_cadastro()">Cadastrar</button>
            </div>

            <div class="flex flex-col gap-1 items-center " ">
                <p>Já tem uma conta?</p>

                <a href="{{ url_for('login') }}" 
                class="text-blue-600 hover:underline font-lato">
                Clique aqui para logar.
                </a>
            </div>
            
            <p id="feedback-cadastro" class="p-2"></p>
        </section>                                                                                                                                                  
    </main>
    <script>
        function fazer_cadastro() {

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const dados = {

                email: email,
                senha: senha
            }

            fetch ('/cadastrar', {

                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            })
            .then(resposta => resposta.json())
           
        }
    </script>
</body>
</html>
