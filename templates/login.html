<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-Vindo ao Seedra!</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400;1,900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
        theme: {
            extend: {
            fontFamily: {
                lato: ['Lato', 'sans-serif'],
            }
            }
        }
        }
    </script>
</head>
<body>
    <main class="flex justify-center items-center h-screen font-[Lato]">
        <section class="flex flex-col rounded-2xl justify-center items-center bg-gray-200 h-100 w-100 gap-10 shadow-xl shadow-black-500">

            <p class="text-5xl">Login</p>

            <div class="flex flex-col gap-5">
                <input class="border-gray-500 rounded-sm px-3 py-1" type="email" placeholder="Digite seu email...">
                <input class="border-gray-500 rounded-sm px-3 py-1" type="password" placeholder="Digite sua senha...">
            </div>

            <button class="btn btn-neutral bg-green-700 px-7 " type="submit">Logar</button>

        </section>                                                                                                                                                  
    </main>
</body>
</html>
