<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEEDRA - Login</title>
    
    <link rel="icon" href="{{ url_for('static', filename='seedot.gif') }}" type="image/gif" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              seedra: {
                leafDark: '#0a3b24', 
                leafMid: '#2d6a4f', 
                leafLight: '#52b788',
                bg: '#cffce6'
              }
            }
          }
        }
      }
    </script>
</head>
<body class="bg-seedra-bg font-sans min-h-screen flex items-center justify-center p-4">
    
    <main class="w-full max-w-md">
        <section class="bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 p-8 sm:p-10">
            
            <div class="flex justify-center mb-3">
                <div class="h-32 w-64  flex items-center justify-center ">
                    <img src="{{ url_for('static', filename='Letreiro_SEEDRA-removebg-preview.png') }}" alt="Ícone SEEDRA" class="h-full object-contain">
                </div>
            </div>
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Acesse sua conta</h1>
                <p class="text-sm text-gray-500 mt-1">Bem-vindo de volta ao painel de controle</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email..." required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm">
                </div>

                <div>
                    <label for="senha" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm">
                </div>

                <button type="submit" class="w-full bg-seedra-leafDark hover:bg-seedra-leafMid text-white font-medium py-2.5 rounded-lg transition-colors mt-2 shadow-sm">
                    Entrar no Sistema
                </button>
            </form>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mt-4">
                    {% for categoria, mensagem in messages %}
                        <div class="p-3 rounded-lg text-sm font-medium text-center {% if categoria == 'erro' %}bg-red-50 text-red-700 border border-red-100{% else %}bg-green-50 text-green-700 border border-green-100{% endif %}">
                            {{ mensagem }}
                        </div>
                    {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <p class="text-sm text-center text-gray-600 mt-8">
                Ainda não tem uma conta? 
                <a href="{{ url_for('cadastro') }}" class="text-seedra-leafMid hover:text-seedra-leafDark font-semibold hover:underline transition-colors">
                    Cadastre-se aqui
                </a>
            </p>
        </section>
    </main>
    
</body>
</html>
