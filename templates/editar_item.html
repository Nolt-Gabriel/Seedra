{% extends 'base.html' %}

{% block title %}Editar: {{ item.nome_comum }}{% endblock %}
{% block header_subtitle %}Acervo Geral{% endblock %}
{% block header_title %}Editar Espécie{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto clean-card p-8">
    
    <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-6">
        <h3 class="text-xl font-bold text-gray-800">Atualizar Ficha Técnica</h3>
        <a href="{{ url_for('detalhes_item', id=item.id) }}" class="text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors">
            <i class="fa-solid fa-arrow-left mr-1"></i> Cancelar
        </a>
    </div>
    
    <form action="{{ url_for('editar_item', id=item.id) }}" method="POST" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Comum</label>
                <input type="text" name="nome_comum" value="{{ item.nome_comum }}" required 
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Científico</label>
                <input type="text" name="nome_cientifico" value="{{ item.nome_cientifico }}" required 
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm italic" />
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                <select name="categoria" required class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm">
                    <option value="Semente" {% if item.categoria == 'Semente' %}selected{% endif %}>Semente</option>
                    <option value="Planta" {% if item.categoria == 'Planta' %}selected{% endif %}>Planta</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. em Estoque</label>
                <input type="number" name="quantidade" min="0" value="{{ item.quantidade }}" required 
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Limite p/ Déficit
                    <i class="fa-solid fa-circle-info text-gray-400 ml-1" title="Abaixo deste valor, o sistema emitirá alerta"></i>
                </label>
                <input type="number" name="limite_deficit" min="1" value="{{ item.limite_deficit }}" required 
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm" />
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Observações de Cuidado / Plantio</label>
            <textarea name="observacoes" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-seedra-leafLight focus:border-transparent outline-none transition-all text-sm h-32">{{ item.observacoes }}</textarea>
        </div>

        <div class="pt-4 flex justify-end gap-3 border-t border-gray-100">
            <button type="submit" class="px-6 py-2.5 bg-seedra-leafDark hover:bg-seedra-leafMid text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
                Guardar Alterações
            </button>
        </div>
    </form>
</div>
{% endblock %}
